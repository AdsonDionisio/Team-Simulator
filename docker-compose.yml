services:
  devsim:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devsim-simulator
    ports:
      - "8004:80"
    restart: always
    # As chaves de API em SPAs são normalmente "baked" no build, 
    # mas mantemos aqui para referência se o app fosse fullstack.
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
