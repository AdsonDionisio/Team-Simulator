services:
  devsim:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devsim-simulator
    ports:
      - "8004:3000"
    restart: always
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
    networks:
      - ollama

networks:
  ollama:
    external: true
